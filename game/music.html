<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>캐미누 리듬배틀 DX</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#040714;color:#fff;font-family:Arial,"Noto Sans KR",sans-serif}
#game{position:fixed;inset:0;width:100%;height:100%;display:block;background:#040714;touch-action:none}
.ui{position:fixed;inset:0;pointer-events:none}
.glass{background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(0,0,0,.40));border:1px solid rgba(255,255,255,.22);box-shadow:0 12px 30px rgba(0,0,0,.42),inset 0 0 20px rgba(255,255,255,.05);backdrop-filter:blur(8px)}
.hud{position:absolute;top:calc(env(safe-area-inset-top,0px) + 8px);left:8px;right:8px;height:44px;display:grid;grid-template-columns:1fr 1fr 1fr 38px;gap:6px}
.stat{border-radius:14px;padding:5px 8px;font-weight:1000;display:flex;align-items:center;justify-content:space-between;min-width:0}
.stat span{font-size:9px;opacity:.72}.stat b{font-size:15px;white-space:nowrap}
.musicBtn{border-radius:14px;font-size:18px;font-weight:1000;color:#fff;pointer-events:auto;display:grid;place-items:center}
.boss{position:absolute;top:calc(env(safe-area-inset-top,0px) + 58px);left:50%;transform:translateX(-50%);width:min(86vw,480px);height:48px;border-radius:16px;padding:7px 12px}
.bossTitle{font-size:11px;font-weight:1000;color:#ffd338;text-align:center;margin-bottom:4px}
.bar{height:14px;border-radius:999px;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.16);overflow:hidden}
.fill{height:100%;width:100%;background:linear-gradient(90deg,#ff244d,#ff8a2a,#ffe65d)}
.judge{position:absolute;left:50%;top:36%;transform:translate(-50%,-50%);font-size:34px;font-weight:1000;text-shadow:0 7px 22px #000;opacity:0;transition:.07s;white-space:nowrap}
.comboText{position:absolute;left:50%;top:42%;transform:translateX(-50%);font-size:22px;font-weight:1000;text-shadow:0 5px 18px #000;opacity:.92}
.laneButtons{position:absolute;left:8px;right:8px;bottom:calc(env(safe-area-inset-bottom,0px) + 8px);height:78px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;pointer-events:auto}
.laneBtn{border:1px solid rgba(255,255,255,.26);border-radius:18px;color:#fff;font-size:25px;font-weight:1000;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(0,0,0,.36));box-shadow:0 8px 0 rgba(0,0,0,.38),0 18px 28px rgba(0,0,0,.35)}
.laneBtn:active,.laneBtn.hit{transform:translateY(4px);box-shadow:0 4px 0 rgba(0,0,0,.38),0 10px 18px rgba(0,0,0,.28);filter:brightness(1.45)}
.center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;pointer-events:none}
.panel{width:min(94vw,540px);border-radius:30px;padding:20px 16px;text-align:center;background:linear-gradient(180deg,rgba(42,58,130,.97),rgba(5,7,22,.98));border:1px solid rgba(255,255,255,.22);box-shadow:0 30px 110px rgba(0,0,0,.7);pointer-events:auto;position:relative;overflow:hidden}
.panel:before{content:"";position:absolute;inset:-90px;background:radial-gradient(circle at 18% 8%,rgba(255,211,60,.34),transparent 32%),radial-gradient(circle at 82% 18%,rgba(89,215,255,.32),transparent 35%);pointer-events:none}
.panel>*{position:relative}
.logo{font-size:35px;line-height:1.04;margin:2px 0 12px;font-weight:1000;letter-spacing:-1.3px;text-shadow:0 5px 0 #151515,0 12px 22px rgba(0,0,0,.6)}
.logo .y{color:#ffd338}.logo .w{color:#fff}
.songList{display:grid;gap:8px;margin:10px 0}
.songBtn{height:58px;border-radius:16px;border:1px solid rgba(255,255,255,.22);background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(0,0,0,.36));color:#fff;text-align:left;padding:8px 12px;font-weight:1000}
.songBtn.selected{outline:3px solid #ffd338;background:linear-gradient(180deg,rgba(255,211,56,.28),rgba(0,0,0,.36))}
.songBtn small{display:block;opacity:.72;margin-top:3px}
.choose{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}
.char{height:86px;border-radius:15px;border:1px solid rgba(255,255,255,.22);background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(0,0,0,.34));color:#fff;text-align:left;padding:8px;position:relative;overflow:hidden}
.char.selected{outline:3px solid #ffd338;background:linear-gradient(180deg,rgba(255,211,56,.28),rgba(0,0,0,.36))}
.char img{position:absolute;right:6px;bottom:16px;width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 10px 12px rgba(0,0,0,.45))}
.char h3{margin:0;font-size:15px}.char p{margin:3px 0 0;font-size:9px;line-height:1.25;opacity:.84;width:62%}
.play,.share{margin-top:12px;border:0;border-radius:22px;padding:13px 28px;min-width:210px;font-size:21px;font-weight:1000;color:#4b2500;background:linear-gradient(#fff06b,#ffb51f);box-shadow:0 8px 0 #a95c00,0 18px 34px rgba(0,0,0,.35)}
.share{background:linear-gradient(#92f7ff,#5292ff);box-shadow:0 8px 0 #1c56a5,0 18px 34px rgba(0,0,0,.35);color:#07152b;font-size:18px}
.hidden{display:none!important}
.err{position:absolute;left:10px;right:10px;bottom:100px;background:rgba(255,50,80,.94);border-radius:12px;padding:10px;font-size:12px;display:none;z-index:99;pointer-events:auto}

/* === DX 2.0 commercial-feel hit/visual patch === */
.judge{
  font-size:42px;
  letter-spacing:-1px;
  filter:drop-shadow(0 0 16px currentColor);
}
.comboText{
  font-size:26px;
  color:#fff;
  filter:drop-shadow(0 0 12px #70e7ff);
}
.laneBtn{
  position:relative;
  overflow:hidden;
}
.laneBtn:before{
  content:"";
  position:absolute;
  inset:-30%;
  background:radial-gradient(circle,rgba(255,255,255,.38),transparent 55%);
  opacity:0;
  transition:.08s;
}
.laneBtn.hit:before{opacity:1}


/* === DX3: panel notes + full lane touch === */
.laneButtons{
  left:0;
  right:0;
  bottom:calc(env(safe-area-inset-bottom,0px));
  height:26vh;
  gap:0;
  opacity:.92;
}
.laneBtn{
  border-radius:0;
  border-left:1px solid rgba(255,255,255,.18);
  border-right:1px solid rgba(255,255,255,.18);
  border-top:1px solid rgba(255,255,255,.20);
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.38));
  box-shadow:none;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:18px;
  font-size:26px;
  color:rgba(255,255,255,.92);
}
.laneBtn:active,.laneBtn.hit{
  transform:none;
  box-shadow:inset 0 0 42px rgba(255,211,56,.38);
  filter:brightness(1.5);
}

</style>
</head>

<audio id="bgm" preload="auto"></audio>
<canvas id="game"></canvas>
<div class="ui">
  <div class="hud">
    <div class="stat glass"><span>SCORE</span><b id="score">0</b></div>

  <div class="comboText" id="comboText"></div>

function gid(id){return document.getElementById(id)}
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth||360;H=innerHeight||640;canvas.width=W*DPR|0;canvas.height=H*DPR|0;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);hitY=H-Math.max(118,H*.25);missLine=hitY+36}
addEventListener('resize',resize,false);resize();
function rand(a,b){return a+Math.random()*(b-a)}
function buildSongButtons(){el.songList.innerHTML='';CHART.songs.forEach(function(s,i){var b=document.createElement('button');b.className='songBtn'+(i===songIndex?' selected':'');b.innerHTML=s.title+'<small>BPM '+s.bpm+' · '+s.notes.length+' notes · MP3 beat map</small>';b.onclick=function(){songIndex=i;currentSong=CHART.songs[i];buildSongButtons()};el.songList.appendChild(b)})}
function start(){currentSong=CHART.songs[songIndex];chart=currentSong.notes.slice();started=true;gameOver=false;score=0;combo=0;maxCombo=0;life=hero==='imdae'?115:100;bossHp=100;notes=[];fx=[];particles=[];spawnIndex=0;shake=0;flash=0;beatPulse=0;fever=0;laneGlow=[0,0,0,0];el.menu.className='center hidden';el.over.className='center hidden';bgm.src=currentSong.file;bgm.currentTime=0;playBgm();startTime=performance.now()/1000+0.25;last=performance.now()/1000;requestAnimationFrame(loop)}
function timeNow(){return performance.now()/1000-startTime}
function update(dt){if(!started||gameOver)return;var t=timeNow();while(spawnIndex<chart.length&&chart[spawnIndex].time<t+2.15){var n=chart[spawnIndex++];notes.push({lane:n.lane,time:n.time,hit:false,y:-40,type:n.type||'tap'});beatPulse=Math.max(beatPulse,.65)}for(var i=notes.length-1;i>=0;i--){var n=notes[i];n.y=hitY-(n.time-t)*speed;if(!n.hit&&n.y>missLine){miss(n);notes.splice(i,1)}else if(n.y>H+60)notes.splice(i,1)}for(i=fx.length-1;i>=0;i--){fx[i].life-=dt;fx[i].r+=140*dt;if(fx[i].life<=0)fx.splice(i,1)}for(i=particles.length-1;i>=0;i--){particles[i].life-=dt;particles[i].x+=particles[i].vx*dt;particles[i].y+=particles[i].vy*dt;particles[i].vy+=180*dt;if(particles[i].life<=0)particles.splice(i,1)}for(i=0;i<4;i++)laneGlow[i]=Math.max(0,laneGlow[i]-dt*4.8);shake=Math.max(0,shake-dt*9);flash=Math.max(0,flash-dt*3.5);beatPulse=Math.max(0,beatPulse-dt*3.8);fever=combo>=100?1:(combo>=50?.55:0);if(t>currentSong.duration-0.2&&notes.length===0)end(bossHp<=0);updateUI()}
function press(lane){if(!started||gameOver)return;var t=timeNow(),best=null,bestD=999;for(var i=0;i<notes.length;i++){var n=notes[i];if(n.lane!==lane||n.hit)continue;var d=Math.abs((n.time-t)*1000);if(d<bestD){bestD=d;best=n}}pulseBtn(lane);if(best&&bestD<good){notes.splice(notes.indexOf(best),1);if(bestD<perfect)hit('PERFECT',lane);else if(bestD<great)hit('GREAT',lane);else hit('GOOD',lane)}else badPress(lane)}
function hit(type,lane){
 var mult=hero==='george'?1.12:1;
 combo++;maxCombo=Math.max(maxCombo,combo);
 var add=type==='PERFECT'?1000:type==='GREAT'?750:450;
 if(hero==='cheolhee'&&type==='PERFECT')add*=1.35;
 score+=Math.floor(add*(1+combo*.012)*mult);
 bossHp-=type==='PERFECT'?2.0:type==='GREAT'?1.35:.75;
 var color=type==='PERFECT'?'#ffd338':type==='GREAT'?'#70e7ff':'#b58cff';
 var x=laneX(lane);
 laneGlow[lane]=1;
 flash=Math.max(flash,type==='PERFECT'?.38:.22);
 shake=Math.max(shake,type==='PERFECT'?.36:.18);
 fx.push({x:x,y:hitY,r:type==='PERFECT'?24:18,life:.34,c:color});
 fx.push({x:x,y:hitY,r:type==='PERFECT'?42:30,life:.22,c:'#ffffff'});
 burst(x,hitY,color,type==='PERFECT'?34:20);
 if(combo===50)showJudge('FEVER READY', '#70e7ff'); else if(combo===100)showJudge('FEVER TIME', '#ffd338'); else showJudge(type,color);
 sfx(type==='PERFECT'?'perfect':'hit');
 if(bossHp<=0)end(true)
}
function miss(n){combo=0;life-=hero==='imdae'?5:8;shake=.55;showJudge('MISS','#ff4d6d');laneGlow[n.lane]=.6;fx.push({x:laneX(n.lane),y:hitY,r:22,life:.25,c:'#ff4d6d'});burst(laneX(n.lane),hitY,'#ff4d6d',10);sfx('miss');if(life<=0)end(false)}
function badPress(lane){combo=0;life-=3;showJudge('BAD','#ff8a2a');laneGlow[lane]=.45;fx.push({x:laneX(lane),y:hitY,r:16,life:.18,c:'#ff8a2a'});burst(laneX(lane),hitY,'#ff8a2a',8);sfx('miss');if(life<=0)end(false)}
function burst(x,y,c,n){
 for(var i=0;i<n;i++){
  var a=Math.random()*Math.PI*2, sp=120+Math.random()*260;
  particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-80,r:2+Math.random()*4,life:.28+Math.random()*.28,c:c});
 }
}
var audioCtx=null;
function sfx(type){
 try{
  if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  var now=audioCtx.currentTime;
  var osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  var f=type==='perfect'?880:(type==='hit'?620:160);
  osc.type=type==='miss'?'sawtooth':'triangle';
  osc.frequency.setValueAtTime(f,now);
  if(type==='perfect')osc.frequency.exponentialRampToValueAtTime(1320,now+.08);
  gain.gain.setValueAtTime(type==='miss'?.055:.045,now);
  gain.gain.exponentialRampToValueAtTime(.001,now+(type==='miss'?.16:.10));
  osc.start(now);osc.stop(now+(type==='miss'?.16:.10));
 }catch(e){}
}
function showJudge(t,c){el.judge.innerHTML=t;el.judge.style.color=c;el.judge.style.opacity=1;clearTimeout(showJudge.to);showJudge.to=setTimeout(function(){el.judge.style.opacity=0},170)}
function pulseBtn(lane){var b=document.querySelector('.laneBtn[data-lane="'+lane+'"]');if(!b)return;b.classList.add('hit');setTimeout(function(){b.classList.remove('hit')},85)}
function laneX(l){var pad=24,w=(W-pad*2)/4;return pad+w*l+w/2}
function updateUI(){el.score.innerHTML=Math.floor(score);el.combo.innerHTML=combo;el.life.innerHTML=Math.max(0,Math.floor(life));el.comboText.innerHTML=combo>0?combo+' COMBO':'';el.bossHp.style.width=Math.max(0,bossHp)+'%';el.bossTitle.innerHTML='BOSS 변대리 비트 · '+currentSong.title}
function draw(){ctx.save();if(shake>0)ctx.translate(rand(-shake*4,shake*4),rand(-shake*4,shake*4));drawBg();drawBoss();drawLanes();drawNotes();drawFx();drawParticles();drawFlash();ctx.restore()}
function drawBg(){
 var t=performance.now()/1000;
 var g=ctx.createLinearGradient(0,0,0,H);
 g.addColorStop(0,fever?'#23005a':'#100530');
 g.addColorStop(.52,fever?'#2840b0':'#12276b');
 g.addColorStop(1,'#050711');
 ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 var pulse=beatPulse+Math.min(combo/180,.8)+fever*.45;
 for(var i=0;i<30;i++){
  var y=(t*(55+pulse*40)+i*50)%H;
  ctx.strokeStyle='rgba(112,231,255,'+(0.07+pulse*.07)+')';
  ctx.lineWidth=2+pulse*1.5;
  ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y+35);ctx.stroke();
 }
 if(combo>50){
  ctx.fillStyle='rgba(255,211,56,'+(0.025+Math.sin(t*8)*.015)+')';
  ctx.fillRect(0,0,W,H);
 }
}function drawBoss(){ctx.save();ctx.translate(W/2,132);var pulse=0.82+Math.sin(performance.now()/120)*.018+beatPulse*.035;ctx.scale(pulse,pulse);ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(0,46,76,14,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#252d43';ctx.roundRect(-72,-16,144,62,20);ctx.fill();ctx.strokeStyle='rgba(112,231,255,.35)';ctx.lineWidth=3;ctx.stroke();ctx.save();ctx.beginPath();ctx.arc(0,-28,42,0,Math.PI*2);ctx.clip();ctx.drawImage(byeon,-45,-67,90,90);ctx.restore();ctx.strokeStyle=beatPulse>.25?'#ffd338':(combo>50?'#70e7ff':'#fff');ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-28,42,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#ff244d';ctx.font='900 12px Arial';ctx.textAlign='center';ctx.fillText('BOSS 변대리',0,58);ctx.restore()}
function drawLanes(){
 var pad=24,w=(W-pad*2)/4,top=205,bottom=hitY+24,center=W/2;
 ctx.save();
 ctx.beginPath();ctx.moveTo(center-108,top);ctx.lineTo(center+108,top);ctx.lineTo(pad+w*4,bottom);ctx.lineTo(pad,bottom);ctx.closePath();ctx.clip();
 ctx.fillStyle='rgba(0,0,0,.38)';ctx.fillRect(0,top,W,bottom-top);
 for(var i=0;i<4;i++){
  var x1=center-108+i*(216/4),x2=center-108+(i+1)*(216/4),bx1=pad+i*w,bx2=pad+(i+1)*w;
  ctx.beginPath();ctx.moveTo(x1,top);ctx.lineTo(x2,top);ctx.lineTo(bx2,bottom);ctx.lineTo(bx1,bottom);ctx.closePath();
  var glow=laneGlow[i], hue=['112,231,255','255,211,56','181,140,255','255,118,110'][i];
  ctx.fillStyle='rgba(255,255,255,'+(i%2?.04:.07)+')';ctx.fill();
  if(glow>0){ctx.fillStyle='rgba('+hue+','+(glow*.38)+')';ctx.fill();}
  if(fever>0){ctx.fillStyle='rgba(255,211,56,'+(fever*.055)+')';ctx.fill();}
  ctx.strokeStyle='rgba('+hue+','+(0.22+glow*.58)+')';ctx.lineWidth=1.5+glow*2.2;ctx.stroke();
 }
 ctx.restore();

 // wide judgment strike line
 var lineGrad=ctx.createLinearGradient(pad,0,pad+w*4,0);
 lineGrad.addColorStop(0,'rgba(255,211,56,0)');
 lineGrad.addColorStop(.25,'#ffd338');
 lineGrad.addColorStop(.5,'#ffffff');
 lineGrad.addColorStop(.75,'#ffd338');
 lineGrad.addColorStop(1,'rgba(255,211,56,0)');
 ctx.fillStyle='rgba(255,211,56,.24)';
 ctx.fillRect(pad,hitY-10,w*4,20);
 ctx.strokeStyle=lineGrad;
 ctx.lineWidth=5;
 ctx.beginPath();ctx.moveTo(pad,hitY);ctx.lineTo(pad+w*4,hitY);ctx.stroke();

 // full touch zone guide
 ctx.globalAlpha=.14;
 for(i=0;i<4;i++){
  ctx.strokeStyle=['#70e7ff','#ffd338','#b58cff','#ff766e'][i];
  ctx.strokeRect(i*W/4,H-H*.26,W/4,H*.26);
 }
 ctx.globalAlpha=1;

 for(i=0;i<4;i++){
  if(laneGlow[i]>0){
   var x=laneX(i);
   var glowColor=['112,231,255','255,211,56','181,140,255','255,118,110'][i];
   ctx.fillStyle='rgba('+glowColor+','+(laneGlow[i]*.28)+')';
   ctx.roundRect(x-w*.42,hitY-24,w*.84,48,14);
   ctx.fill();
   ctx.strokeStyle='rgba(255,255,255,'+(laneGlow[i]*.72)+')';
   ctx.lineWidth=3;
   ctx.roundRect(x-w*.42,hitY-24,w*.84,48,14);
   ctx.stroke();
  }
 }
}function drawNotes(){
 for(var i=0;i<notes.length;i++){
  var n=notes[i],x=laneX(n.lane),y=n.y;
  var c=['#70e7ff','#ffd338','#b58cff','#ff766e'][n.lane];
  var scale=0.62+(y/Math.max(1,H))*0.50;
  var near=Math.max(0,1-Math.abs(y-hitY)/150);

  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale*(1+near*.05),scale*(1+near*.05));

  var w=82,h=28;

  // 얇은 네온 잔상만: 흰색 사각형처럼 보이지 않게 아주 약하게
  if(near>.05){
    ctx.globalAlpha=near*.22;
    ctx.fillStyle=c;
    ctx.roundRect(-w/2-10,-h/2-8,w+20,h+16,14);
    ctx.fill();
    ctx.globalAlpha=1;
  }

  // 바닥 그림자
  ctx.fillStyle='rgba(0,0,0,.42)';
  ctx.roundRect(-w/2+4,-h/2+7,w,h,10);
  ctx.fill();

  // 메인 금속 패널
  var body=ctx.createLinearGradient(0,-h/2,0,h/2);
  body.addColorStop(0,'#f7fbff');
  body.addColorStop(.10,c);
  body.addColorStop(.45,'#1a2440');
  body.addColorStop(1,'#060912');
  ctx.shadowColor=c;
  ctx.shadowBlur=14+near*18;
  ctx.fillStyle=body;
  ctx.roundRect(-w/2,-h/2,w,h,9);
  ctx.fill();
  ctx.shadowBlur=0;

  // 외곽 라인
  ctx.strokeStyle='rgba(255,255,255,.92)';
  ctx.lineWidth=2;
  ctx.roundRect(-w/2,-h/2,w,h,9);
  ctx.stroke();

  // 안쪽 홈
  ctx.strokeStyle='rgba(255,255,255,.58)';
  ctx.lineWidth=2.4;
  ctx.beginPath();
  ctx.moveTo(-24,0);
  ctx.lineTo(24,0);
  ctx.stroke();

  // 양쪽 네온 포인트
  ctx.fillStyle=c;
  ctx.roundRect(-w/2+6,-h/2+5,6,h-10,4);
  ctx.roundRect(w/2-12,-h/2+5,6,h-10,4);
  ctx.fill();

  // 판정선 근처 접근 효과: 테두리만 확대
  if(near>.25){
    ctx.globalAlpha=near*.75;
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=3;
    ctx.roundRect(-w/2-7,-h/2-6,w+14,h+12,12);
    ctx.stroke();
    ctx.globalAlpha=1;
  }

  ctx.restore();
 }
}function drawFx(){for(var i=0;i<fx.length;i++){var f=fx[i];ctx.globalAlpha=Math.max(0,f.life/.30);ctx.strokeStyle=f.c;ctx.lineWidth=5;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.stroke();ctx.fillStyle=f.c;ctx.globalAlpha*=.25;ctx.beginPath();ctx.arc(f.x,f.y,f.r*.45,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function calcRank(clear){if(clear&&life>80&&maxCombo>chart.length*.55)return 'S';if(score>chart.length*520)return 'A';if(score>chart.length*360)return 'B';return 'C'}

function drawParticles(){
 for(var i=0;i<particles.length;i++){
  var p=particles[i], a=Math.max(0,p.life/.56);
  ctx.globalAlpha=a;
  ctx.fillStyle=p.c;
  ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=a*.45;
  ctx.strokeStyle=p.c;ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,p.r*2.2,0,Math.PI*2);ctx.stroke();
 }
 ctx.globalAlpha=1;
}
function drawFlash(){
 if(flash<=0)return;
 ctx.globalAlpha=flash*.18;
 ctx.fillStyle='#ffffff';
 ctx.fillRect(0,0,W,H);
 ctx.globalAlpha=1;
}
function end(clear){gameOver=true;started=false;try{bgm.pause()}catch(e){}rank=calcRank(clear);el.over.className='center';el.resultTitle.innerHTML=clear?'CLEAR!':'GAME OVER';el.result.innerHTML='곡: <b>'+currentSong.title+'</b><br>랭크: <b>'+rank+'</b><br>점수: <b>'+Math.floor(score)+'</b><br>최대 콤보: <b>'+maxCombo+'</b><br>남은 체력: <b>'+Math.max(0,Math.floor(life))+'</b>'}
function loop(){var now=performance.now()/1000,dt=Math.min(now-last,.033);last=now;update(dt);draw();requestAnimationFrame(loop)}
function playBgm(){if(!musicOn)return;try{bgm.volume=.35;bgm.play().catch(function(){})}catch(e){}}
document.querySelectorAll('.char').forEach(function(b){b.onclick=function(){document.querySelectorAll('.char').forEach(function(x){x.classList.remove('selected')});b.classList.add('selected');hero=b.dataset.hero}})
document.querySelectorAll('.laneBtn').forEach(function(b){b.addEventListener('touchstart',function(e){press(Number(b.dataset.lane));e.preventDefault()},{passive:false});b.addEventListener('mousedown',function(){press(Number(b.dataset.lane))})})

canvas.addEventListener('touchstart',function(e){
 if(!started||gameOver)return;
 var t=e.changedTouches[0];
 var lane=Math.max(0,Math.min(3,Math.floor(t.clientX/(W/4))));
 press(lane);
 e.preventDefault();
},{passive:false});
canvas.addEventListener('mousedown',function(e){
 if(!started||gameOver)return;
 var lane=Math.max(0,Math.min(3,Math.floor(e.clientX/(W/4))));
 press(lane);
});

document.addEventListener('keydown',function(e){var map={d:0,f:1,j:2,k:3,D:0,F:1,J:2,K:3};if(map[e.key]!==undefined)press(map[e.key])})
gid('startBtn').onclick=start;gid('restartBtn').onclick=function(){el.over.className='center hidden';el.menu.className='center';buildSongButtons()};
gid('musicBtn').onclick=function(){musicOn=!musicOn;gid('musicBtn').innerHTML=musicOn?'♪':'×';if(!musicOn)bgm.pause();else if(started)playBgm()};
gid('shareBtn').onclick=function(){var text='캐미누 리듬배틀 DX - '+currentSong.title+' / 랭크 '+rank+' / 점수 '+Math.floor(score)+' / 콤보 '+maxCombo;if(navigator.share)navigator.share({title:'캐미누 리듬배틀 DX',text:text}).catch(function(){});else if(navigator.clipboard)navigator.clipboard.writeText(text).then(function(){showJudge('복사 완료','#70e7ff')})};
buildSongButtons();updateUI();loop();
}catch(e){err.style.display='block';err.innerHTML='초기 오류: '+(e.message||e)} 
})();
</script>
